replicaCount: 1

image:
  repository: ghcr.io/smart-mcp-proxy/synapbus
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false
  name: ""

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: synapbus.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
    # - secretName: synapbus-tls
    #   hosts:
    #     - synapbus.local

persistence:
  enabled: true
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 1Gi

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

env:
  SYNAPBUS_LOG_LEVEL: info
  SYNAPBUS_METRICS: "true"

metrics:
  enabled: true
  serviceMonitor:
    interval: 30s
    scrapeTimeout: 10s
    additionalLabels: {}

nodeSelector: {}

tolerations: []

affinity: {}
