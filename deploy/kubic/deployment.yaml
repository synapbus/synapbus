apiVersion: apps/v1
kind: Deployment
metadata:
  name: synapbus
  namespace: synapbus
  labels:
    app.kubernetes.io/name: synapbus
    app.kubernetes.io/instance: synapbus
spec:
  replicas: 1
  revisionHistoryLimit: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  selector:
    matchLabels:
      app.kubernetes.io/name: synapbus
      app.kubernetes.io/instance: synapbus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: synapbus
        app.kubernetes.io/instance: synapbus
    spec:
      containers:
        - name: synapbus
          image: docker.io/library/synapbus:v0.17.0-amd64
          imagePullPolicy: IfNotPresent
          args: ["serve", "--host", "0.0.0.0", "--port", "8080", "--data", "/data"]
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: SYNAPBUS_BASE_URL
              value: auto
            - name: SYNAPBUS_EMBEDDING_PROVIDER
              value: openai
            - name: SYNAPBUS_LOG_LEVEL
              value: info
            - name: SYNAPBUS_MESSAGE_RETENTION
              value: "0"
            - name: SYNAPBUS_METRICS
              value: "true"
          envFrom:
            - secretRef:
                name: synapbus-secrets
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: synapbus
