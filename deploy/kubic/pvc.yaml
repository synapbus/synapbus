apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: synapbus
  namespace: synapbus
  labels:
    app.kubernetes.io/name: synapbus
    app.kubernetes.io/instance: synapbus
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: microk8s-hostpath
  resources:
    requests:
      storage: 2Gi
